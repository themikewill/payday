    color: #0F172A;

  .font-display {
    font-family: 'Fredoka', 'Inter', sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  /* Subtle paper texture overlay for depth */
  .paper-bg {
    background-image:
      radial-gradient(circle at 20% 30%, rgba(61, 90, 254, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255, 107, 107, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, rgba(78, 205, 196, 0.04) 0%, transparent 50%);
  }
  /* Animations */
  @keyframes pop-in {
    0% { opacity: 0; transform: scale(0.7) translateY(20px); }
    60% { transform: scale(1.05) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .pop-in { animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(61, 90, 254, 0.5); }
    50% { box-shadow: 0 0 0 12px rgba(61, 90, 254, 0); }
  }
  .pulse-glow { animation: pulse-glow 1.8s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .float { animation: float 3s ease-in-out infinite; }
  /* Narration banner: slides down from top with a satisfying pop, then sits visible
     until React unmounts it. (Exit handled by component unmount, not the keyframe.) */
  @keyframes narration-in {
    0%   { opacity: 0; transform: translate(-50%, -30px) scale(0.85); }
    60%  { opacity: 1; transform: translate(-50%, 4px) scale(1.05); }
    80%  { transform: translate(-50%, 0) scale(0.98); }
    100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  /* Turn handoff: fades in/out with the avatar scaling */
  @keyframes handoff-fade {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes handoff-scale {
    0%   { transform: scale(0.5) translateY(20px); opacity: 0; }
    15%  { transform: scale(1.05) translateY(-3px); opacity: 1; }
    25%  { transform: scale(1) translateY(0); opacity: 1; }
    80%  { transform: scale(1) translateY(0); opacity: 1; }
    100% { transform: scale(0.9) translateY(-10px); opacity: 0; }
  }
  /* Lottery die face bounce on each re-roll */
  @keyframes lottery-bounce {
    0%   { transform: scale(0.7) rotate(-8deg); }
    60%  { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(1) rotate(0); }
  }
  /* Cash bills flying from payer to recipient */
  @keyframes cash-fly {
    0%   { opacity: 0; transform: translateX(-30px) translateY(0) rotate(-15deg) scale(0.6); }
    20%  { opacity: 1; }
    60%  { opacity: 1; transform: translateX(20px) translateY(-12px) rotate(8deg) scale(1.1); }
    100% { opacity: 0; transform: translateX(50px) translateY(0) rotate(15deg) scale(0.8); }
  }
  /* Loading state */
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #FEFAF3 0%, #FFFFFF 50%, #F0F4FF 100%);
    color: #3D5AFE;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700; font-size: 2rem; letter-spacing: 0.05em;
    z-index: 9999; transition: opacity 0.3s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .coin {
    font-size: 3rem; animation: float 2s ease-in-out infinite;
  }

  const bg = player?.color || THEME.primary;
  // Legacy SVG support — preserved so older saved games still render.
  if (player?.avatar === 'fox') return <FoxAvatar size={size} bg={bg} />;
  if (player?.avatar === 'bear') return <BearAvatar size={size} bg={bg} />;
  // Emoji avatar — looked up by id, rendered on a colored disc.
  const av = findAvatar(player?.avatar);
  return (
    <div
      style={{
        width: size,
        height: size,
        borderRadius: '50%',
        background: bg,
        display: 'inline-flex',
        alignItems: 'center',
        justifyContent: 'center',
        boxShadow: `inset 0 0 0 ${Math.max(1, size * 0.04)}px rgba(255,255,255,0.3)`,
        flexShrink: 0,
        // Slightly larger emoji to fill the disc nicely
        fontSize: Math.round(size * 0.7),
        lineHeight: 1,
        // Avoid emoji being clipped on some renderers
        overflow: 'hidden',
        userSelect: 'none',
      }}
      aria-label={av.label}
    >
      <span style={{ display: 'inline-block', transform: 'translateY(2%)' }}>{av.emoji}</span>
    </div>
  );
}

// Bond meter pill — styled to match the jackpot pill (centered banner).
// Color shifts by bond zone: green at +25, pink in neutral, red at -25.
function BondMeterPill({ bond, delta }) {
  const isPositive = bond >=  25;
  const isNegative = bond <= -25;
  const bg = isPositive ? 'linear-gradient(135deg, #34d399, #10b981)'
           : isNegative ? 'linear-gradient(135deg, #fb7185, #e11d48)'
           : 'linear-gradient(135deg, #f472b6, #ec4899)';
  const textColor = '#ffffff';
  const isAnimating = delta !== null && delta !== undefined;
  return (
    <div
      className="flex items-center justify-center gap-2 px-4 py-2 rounded-2xl transition-all"
      style={{
        background: bg,
        color: textColor,
        boxShadow: SHADOW.lg,
        fontFamily: "'Fredoka', sans-serif",
        transform: isAnimating ? 'scale(1.04)' : 'scale(1)',
      }}
    >
      <span style={{ fontSize: '1.25rem' }}>❤️</span>
      <span className="text-xs uppercase tracking-widest font-bold opacity-90">Bond:</span>
      <span className="font-display text-lg tabular-nums">
        {bond > 0 ? '+' : ''}{bond}
      </span>
      {isAnimating && (
        <span
          className="font-display text-sm tabular-nums px-2 py-0.5 rounded-full"
          style={{
            background: 'rgba(255,255,255,0.25)',
            color: delta.change > 0 ? '#dcfce7' : '#ffe4e6',
          }}
        >
          {delta.change > 0 ? '+' : ''}{delta.change}
        </span>
      )}
    </div>
  );
}

// Full-screen turn handoff overlay — appears briefly between turns.
// Shows the next player's avatar and name in a celebratory takeover.
function TurnHandoffOverlay({ handoff }) {
  if (!handoff) return null;
  const { player, recap } = handoff;
  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none p-6"
      style={{
        background: 'rgba(254, 250, 243, 0.85)',
        backdropFilter: 'blur(12px)',
        WebkitBackdropFilter: 'blur(12px)',
        animation: `handoff-fade ${recap ? '3.2s' : '1.8s'} ease-in-out forwards`,
      }}
    >
      <div
        className="flex flex-col items-center max-w-sm w-full"
        style={{ animation: `handoff-scale ${recap ? '3.2s' : '1.8s'} cubic-bezier(0.34, 1.56, 0.64, 1) forwards` }}
      >
        {/* Recap card — only shown if we have changes to report */}
        {recap && recap.changes.length > 0 && (
          <div
            className="mb-6 px-5 py-4 rounded-2xl w-full"
            style={{
              background: 'rgba(255, 255, 255, 0.85)',
              boxShadow: '0 10px 30px rgba(15, 23, 42, 0.08)',
              border: '1px solid rgba(15, 23, 42, 0.06)',
            }}
          >
            <div className="flex items-center gap-2 mb-3">
              <PlayerAvatar player={recap.player} size={32} />
              <div className="text-sm font-bold" style={{ color: recap.player.color }}>
                {recap.player.name}'s turn recap
              </div>
            </div>
            <div className="space-y-1.5">
              {recap.changes.map((c, i) => {
                // For "inverted" stats (loans, bills) growing is bad, shrinking is good
                const isGood = c.inverted ? c.delta < 0 : c.delta > 0;
                const color = isGood ? '#16a34a' : '#dc2626';
                const sign = c.delta > 0 ? '+' : '';
                const value = c.money
                  ? `${sign}$${Math.abs(c.delta).toLocaleString() === '0' ? '0' : (c.delta < 0 ? '-' : '') + Math.abs(c.delta).toLocaleString()}`
                  : `${sign}${c.delta}`;
                return (
                  <div key={i} className="flex justify-between items-center text-sm">
                    <span className="text-slate-600">{c.label}</span>
                    <span className="font-bold tabular-nums" style={{ color }}>{value}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Next player up */}
        <div className="mb-4">
          <PlayerAvatar player={player} size={120} />
        </div>
        <div className="font-display text-sm uppercase tracking-[0.3em] mb-1" style={{ color: THEME.textMuted }}>
          Now playing
        </div>
        <div className="font-display text-5xl text-center" style={{ color: player.color }}>
          {player.name}
        </div>
      </div>
    </div>
  );
}

// ============= STORAGE =============
const loadCards = async () => {
  try {
    const result = await window.storage.get(STORAGE_KEY_CARDS);
    if (result?.value) {
      const saved = JSON.parse(result.value);
      // Merge newer default cards into the saved deck. If a card id from
      // DEFAULT_CARDS isn't present in the saved deck for that category,
      // add it. Also patch in any missing fields on existing cards (e.g. the
      // bond value added in a later version). This keeps the player's edits
      // intact while ensuring new additions reach existing users.
      const merged = {};
      let didChange = false;
      for (const category of Object.keys(DEFAULT_CARDS)) {
        const savedList = Array.isArray(saved[category]) ? saved[category] : [];
        const defaultById = new Map(DEFAULT_CARDS[category].map(c => [c.id, c]));
        const savedIds = new Set(savedList.map(c => c.id));
        // Patch existing cards with any missing fields from defaults
        const patched = savedList.map(c => {
          const def = defaultById.get(c.id);
          if (!def) return c;
          let next = c;
          for (const key of Object.keys(def)) {
            if (next[key] === undefined) {
              next = { ...next, [key]: def[key] };
              didChange = true;
            }
          }
          return next;
        });
        // Append any cards present in defaults but missing from saved
        const missing = DEFAULT_CARDS[category].filter(c => !savedIds.has(c.id));
        if (missing.length > 0) didChange = true;
        merged[category] = [...patched, ...missing];
      }
      if (didChange) {
        try { await window.storage.set(STORAGE_KEY_CARDS, JSON.stringify(merged)); }
        catch (e) { /* non-fatal */ }
      }
      return merged;
    }
  } catch (e) {
    // First run or no data
  }
  return DEFAULT_CARDS;
};

const saveCards = async (cards) => {
  try {
    await window.storage.set(STORAGE_KEY_CARDS, JSON.stringify(cards));
  } catch (e) {
    console.error('Save failed', e);
  }
};

// Audio context — created on first user interaction (browser requirement)
let _audioCtx = null;
const _getCtx = () => {
  if (!_audioCtx && typeof window !== 'undefined') {
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { /* no audio */ }
  }
  return _audioCtx;
};

// Settings — persist on/off toggles
const SETTINGS_KEY = 'payday-mike-shayla-settings-v1';
const defaultSettings = { sound: true, haptics: true };
const loadSettings = () => {
  if (typeof window === 'undefined') return defaultSettings;
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) return { ...defaultSettings, ...JSON.parse(raw) };
  } catch (e) { /* ignore */ }
  return defaultSettings;
};
const saveSettings = (s) => {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) { /* ignore */ }
};

// Track settings at module level so utility functions can check them without React props
let _settings = loadSettings();
const setSettings = (s) => { _settings = s; saveSettings(s); };

// Play a quick tone — uses Web Audio API, no external files
const _tone = (freq, durMs, type = 'sine', vol = 0.15) => {
  if (!_settings.sound) return;
  const ctx = _getCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durMs / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + durMs / 1000);
  } catch (e) { /* ignore */ }
};
