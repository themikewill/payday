// Haptic feedback via vibration API
const HAPTIC = {
  light:  () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate(10); },
  medium: () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate(30); },
  heavy:  () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate(80); },
  win:    () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate([60, 50, 60, 50, 120]); },
  loss:   () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate([100, 50, 100]); },
  bigwin: () => { if (_settings.haptics && navigator.vibrate) navigator.vibrate([40, 30, 40, 30, 40, 30, 200]); },
};

// Confetti — pure DOM, no library. Spawns particles that fall.
const launchConfetti = (intensity = 'normal') => {
  if (typeof document === 'undefined') return;
  const count = intensity === 'huge' ? 120 : intensity === 'normal' ? 60 : 30;
  const colors = ['#fbbf24', '#f472b6', '#a855f7', '#22c55e', '#3b82f6', '#ef4444', '#06b6d4'];
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(container);
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const c = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 8;
    const left = Math.random() * 100;
    const rotate = Math.random() * 360;
    const duration = 2 + Math.random() * 2;
    const drift = (Math.random() - 0.5) * 200;
    p.style.cssText = `
      position:absolute; left:${left}%; top:-20px;
      width:${size}px; height:${size * 0.4}px; background:${c};
      transform:rotate(${rotate}deg);
      animation: confetti-fall-${i} ${duration}s linear forwards;
    `;
    const keyframes = `@keyframes confetti-fall-${i} {
      to { transform: translate(${drift}px, 110vh) rotate(${rotate + 720}deg); opacity: 0; }
    }`;
    const style = document.createElement('style');
    style.textContent = keyframes;
    document.head.appendChild(style);
    container.appendChild(p);
    setTimeout(() => style.remove(), duration * 1000 + 100);
  }
  setTimeout(() => container.remove(), 5000);
};

// ============= MAIN =============
function PaydayV2() {
  const [screen, setScreen] = useState('menu');
  const [cards, setCards] = useState(DEFAULT_CARDS);
  const [cardsLoaded, setCardsLoaded] = useState(false);
  // Draw piles per category: each has { draw: [...remaining ids], discard: [...used ids] }
  // Per official rules: shuffle the discard back when draw pile empties.
  const [decks, setDecks] = useState({});

  // Game state
  const [players, setPlayers] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [month, setMonth] = useState(1);
  const [totalMonths, setTotalMonths] = useState(3);
  const [diceValue, setDiceValue] = useState(null);
  const [isRolling, setIsRolling] = useState(false);
  const [movesLeft, setMovesLeft] = useState(0);
  // When the player is mid-advance via a mail card, this holds the destination
  // metadata so the movement effect knows what to fire on arrival.
  const [advanceContext, setAdvanceContext] = useState(null);
  // Snapshot of the active player's cash/loans/etc at the start of their turn,
  // so we can compute a "what just happened" recap when control passes.
  const turnStartSnapshotRef = useRef(null);
  const [event, setEvent] = useState(null);
  const [narration, setNarration] = useState(null);
  const [turnHandoff, setTurnHandoff] = useState(null);
  const [jackpot, setJackpot] = useState(0); // Pool that grows from charity, drained when someone rolls a 6
  const [jackpotWin, setJackpotWin] = useState(null); // { name, amount } — drives full-screen celebration
  const [cashTransfer, setCashTransfer] = useState(null); // { from, to, amount, reason, direction }
  const [bond, setBond] = useState(BOND_START); // Shared relationship/bond meter, -50 to +50
  const [bondDelta, setBondDelta] = useState(null); // { from, to, change } — animates meter change
  const [log, setLog] = useState([]);
  const [showLoanModal, setShowLoanModal] = useState(false);
  const [showRepayModal, setShowRepayModal] = useState(false);
  // Resume support — once we detect a saved game on mount, we expose it on the menu
  const [hasSavedGame, setHasSavedGame] = useState(false);
  // Lifetime stats (loaded on mount)
  const [stats, setStats] = useState(null);

  // Load saved cards + saved game + stats on mount
  useEffect(() => {
    loadCards().then(c => {
      setCards(c);
      setCardsLoaded(true);
    });
    // Saved game
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY_SAVE);
        if (r?.value) setHasSavedGame(true);
      } catch (e) { /* no save */ }
    })();
    // Stats
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY_STATS);
        if (r?.value) setStats(JSON.parse(r.value));
      } catch (e) { /* fresh stats */ }
    })();
  }, []);

  // Auto-save mid-game state whenever it changes meaningfully.
  // We persist everything needed to fully restore: players, turn, month, decks, jackpot, bond.
  useEffect(() => {
    if (screen !== 'game' || players.length === 0) return;
    const snapshot = {
      version: 1,
      timestamp: Date.now(),
      players, currentIdx, month, totalMonths,
      decks, jackpot, bond,
      log: log.slice(0, 20), // truncate log to last 20 entries to keep saves small
    };
    window.storage.set(STORAGE_KEY_SAVE, JSON.stringify(snapshot))
      .then(() => setHasSavedGame(true))
      .catch(() => {});
  }, [screen, players, currentIdx, month, totalMonths, decks, jackpot, bond]);

  // Load saved game and resume
  const resumeGame = async () => {
    try {
      const r = await window.storage.get(STORAGE_KEY_SAVE);
      if (!r?.value) return;
      const s = JSON.parse(r.value);
      setPlayers(s.players);
      setCurrentIdx(s.currentIdx);
      setMonth(s.month);
      setTotalMonths(s.totalMonths);
      setDecks(s.decks || {});
      setJackpot(s.jackpot || 0);
      setBond(typeof s.bond === 'number' ? s.bond : 0);
      setLog(s.log || []);
      setScreen('game');
    } catch (e) {
      console.error('Failed to resume', e);
    }
  };

  // Clear saved game (called when game finishes naturally)
  const clearSavedGame = () => {
    window.storage.delete(STORAGE_KEY_SAVE).catch(() => {});
    setHasSavedGame(false);
  };

  // Persist updated stats — mutator receives the current stats object and returns the next
  const updateStats = (mutator) => {
    setStats(prev => {
      const base = prev || { gamesPlayed: 0, totalEarnings: 0, biggestPayday: 0, biggestDeal: 0, jackpotsWon: 0, datesHonored: 0, datesSkipped: 0, taxesPaid: 0, hustlesLaunched: 0 };
      const next = mutator(base);
      window.storage.set(STORAGE_KEY_STATS, JSON.stringify(next)).catch(() => {});
      return next;
    });
  };

  const addLog = (msg, type = 'info') => {
    setLog(prev => [{ msg, type, ts: Date.now() + Math.random() }, ...prev].slice(0, 40));
  };

  // ============= START GAME =============
  const startGame = (config) => {
    // Clear any previous saved game when starting a new one
    clearSavedGame();
    updateStats(s => ({ ...s, gamesPlayed: (s.gamesPlayed || 0) + 1 }));
    // config.players: [{ name, avatar, color }, ...] — 2 to 4 entries
    const playerConfigs = config.players;
    const defaultColors = [THEME.p1, THEME.p2, THEME.p3, THEME.p4];
    const newPlayers = playerConfigs.map((pc, i) => ({
      id: i,
      name: pc.name || `Player ${i + 1}`,
      cash: STARTING_CASH,
      loans: 0,
      savings: 0,       // savings account — earns 10% on Payday; can't have savings AND loans
      crypto: 0,        // value of crypto holdings
      position: 0,
      monthsCompleted: 0, // Each player tracks their own progress; game ends when all reach totalMonths
      bills: [],
      monsterCharges: 0,    // Live Monster Charge balance — new charges added when drawn
      monsterCarried: 0,    // Portion of the balance carried from the PREVIOUS Payday. Only this amount accrues 10% interest (grace period on new charges).
      sideHustles: [],      // Array of { tierId, perPayday, cashOut } — active hustles that pay each Payday until cashed out
      deals: [],
      color: pc.color || defaultColors[i] || THEME.primary,
      avatar: pc.avatar || AVATAR_CATALOG[i].id,
    }));
    setPlayers(newPlayers);
    setTotalMonths(config.months);
    setMonth(1);
    setCurrentIdx(0);
    setLog([]);
    setJackpot(0);
    setBond(BOND_START);
    // Initialize shuffled draw piles. Each category gets a shuffled array of indexes.
    const initialDecks = {};
    Object.keys(cards).forEach(cat => {
      if (Array.isArray(cards[cat]) && cards[cat].length > 0) {
        const indices = Array.from({ length: cards[cat].length }, (_, i) => i);
        // Fisher-Yates shuffle
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        initialDecks[cat] = { draw: indices, discard: [] };
      }
    });
    setDecks(initialDecks);
    decksRef.current = initialDecks;
    setScreen('game');
    addLog(`Game start — ${newPlayers.map(p => p.name).join(' vs ')} • ${config.months} month${config.months > 1 ? 's' : ''}`, 'good');
  };

  // Ref-mirror of decks for synchronous reads (e.g. drawing multiple cards in one handler)
  const decksRef = useRef({});
  useEffect(() => { decksRef.current = decks; }, [decks]);

  // Ref-mirror of jackpot so closures (e.g. dice settle setInterval) see current value
  const jackpotRef = useRef(0);
  useEffect(() => { jackpotRef.current = jackpot; }, [jackpot]);
  // Tracks whether a jackpot was JUST won — used to extend its celebration banner
  // before the next-landing banner takes over.
  const jackpotJustWonRef = useRef(false);

  // Draw the next card from a shuffled deck. Returns the card object.
  // When the draw pile empties, shuffles the discard pile back in.
  const drawCard = (category) => {
    const pool = cards[category];
    if (!pool || pool.length === 0) return null;
    const current = decksRef.current[category] || { draw: [], discard: [] };
    let drawPile = [...current.draw];
    let discardPile = [...current.discard];
    if (drawPile.length === 0) {
      drawPile = [...discardPile];
      discardPile = [];
      for (let i = drawPile.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [drawPile[i], drawPile[j]] = [drawPile[j], drawPile[i]];
      }
    }
    if (drawPile.length === 0) {
      return pool[Math.floor(Math.random() * pool.length)];
    }
    const topIdx = drawPile.shift();
    const drawnCard = pool[topIdx] || pool[Math.floor(Math.random() * pool.length)];
    discardPile.push(topIdx);
    // Update both the ref (immediately, for next sync draw) AND React state (for re-render)
    decksRef.current = { ...decksRef.current, [category]: { draw: drawPile, discard: discardPile } };
    setDecks(prev => ({ ...prev, [category]: { draw: drawPile, discard: discardPile } }));
    return drawnCard;
  };

  const currentPlayer = players[currentIdx];

  // ============= DICE =============
  const handleRoll = () => {
    if (isRolling || movesLeft > 0 || event) return;
    // Snapshot the player's pre-turn state so we can show a "what changed" recap
    // when control passes to the next player.
    turnStartSnapshotRef.current = {
      playerId: currentPlayer.id,
      cash: currentPlayer.cash,
      savings: currentPlayer.savings,
      crypto: currentPlayer.crypto,
      loans: currentPlayer.loans,
      bills: currentPlayer.bills.length,
      deals: currentPlayer.deals.length,
    };
    setIsRolling(true);
    SFX.diceShake();
    let n = 0;
    const iv = setInterval(() => {
      setDiceValue(rollDie());
      n++;
      if (n > 14) {
        clearInterval(iv);
        const final = rollDie();
        setDiceValue(final);
        setIsRolling(false);
        setMovesLeft(final);
        SFX.diceLand();
        HAPTIC.medium();
        addLog(`🎲 ${currentPlayer.name} rolled ${final}`, 'info');
        setNarration({ text: `${currentPlayer.name} rolled a ${final}!`, kind: 'roll', icon: '🎲' });
        // JACKPOT! Rolling a 6 always celebrates. Wins the pool if there is one.
        if (final === 6) {
          const currentJackpot = jackpotRef.current;
          if (currentJackpot > 0) {
            setJackpot(0);
            jackpotRef.current = 0;
            setPlayers(prev => prev.map((p, i) => i === currentIdx ? { ...p, cash: p.cash + currentJackpot } : p));
            addLog(`🎰 JACKPOT! ${currentPlayer.name} won $${currentJackpot.toLocaleString()}!`, 'good');
            // Full-screen celebration so it's impossible to miss on mobile
            setJackpotWin({ name: currentPlayer.name, amount: currentJackpot });
            updateStats(s => ({ ...s, jackpotsWon: (s.jackpotsWon || 0) + 1, totalEarnings: (s.totalEarnings || 0) + currentJackpot }));
            setTimeout(() => setJackpotWin(null), 2400);
            jackpotJustWonRef.current = true;
            setTimeout(() => {
              SFX.big(); HAPTIC.bigwin(); launchConfetti('huge');
              setNarration({ text: `🎰 JACKPOT! +$${currentJackpot.toLocaleString()}`, kind: 'roll', icon: '🎰' });
            }, 200);
          } else {
            addLog(`🎰 ${currentPlayer.name} rolled a 6 — Jackpot is empty!`, 'info');
            setTimeout(() => {
              setNarration({ text: `Six! But Jackpot is empty...`, kind: 'roll', icon: '🎰' });
            }, 300);
          }
        }
      }
    }, 80);
  };

  // ============= MOVEMENT =============
  // Use ref-style sequencing: when movesLeft > 0, advance one space, then check for landing event
  useEffect(() => {
    if (movesLeft <= 0 || event || !currentPlayer) return;
    const t = setTimeout(() => {
      // Advance position by 1
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        const nextPos = Math.min(p.position + 1, BOARD_SPACES.length - 1);
        return { ...p, position: nextPos };
      }));
      setMovesLeft(m => m - 1);
    }, 300);
    return () => clearTimeout(t);
  }, [movesLeft, event, currentIdx]);

  // When movesLeft hits 0 (and we just moved), show landing narration, then trigger event
  const prevMovesRef = useRef(0);
  useEffect(() => {
    if (prevMovesRef.current > 0 && movesLeft === 0 && currentPlayer && !event) {
      const space = BOARD_SPACES[currentPlayer.position];
      // Show "Landing on X" narration, then trigger the actual event after a beat
      const landingLabels = {
        mail: { icon: '📬', label: 'Mail!' },
        sweepstakes: { icon: '🎁', label: 'Sweepstakes!' },
        deal: { icon: '💼', label: 'Deal of the Day!' },
        buyer: { icon: '💰', label: 'Found a Buyer!' },
        lottery: { icon: '🎟️', label: 'Lottery!' },
        radio: { icon: '📻', label: 'Radio Contest!' },
        venmo: { icon: '💸', label: 'Zelle!' },
        happybday: { icon: '🎂', label: 'Happy Birthday!' },
        sidehustle: { icon: '⚡', label: 'Side Hustle!' },
        crypto: { icon: '₿', label: 'Crypto Market!' },
        datenight: { icon: '💕', label: 'Date Night!' },
        kidlife: { icon: '👶', label: 'Kid Life!' },
        surprise: { icon: '⚠️', label: 'Surprise Expense!' },
        yardsale: { icon: '🏷️', label: 'Yard Sale!' },
        payday: { icon: '💵', label: 'PAY DAY!' },
      };
      const info = landingLabels[space.type] || { icon: '🎯', label: space.label };
      // If a jackpot just won this turn, hold the celebration banner longer
      // before showing the landing narration. Reset the flag for next turn.
      const jackpotDelay = jackpotJustWonRef.current ? 1800 : 0;
      jackpotJustWonRef.current = false;
      const landingDisplayDelay = jackpotDelay;

      // If this movement was driven by an advance mail card, honor the context's
      // crossed-payday side effects and target event before resetting it.
      const ctx = advanceContext;
      const finishAdvance = () => {
        if (!ctx) return false;
        // Apply pass-Payday side effects if flagged on the card
        if (ctx.crossedPayday && ctx.card.passPayday) {
          const billsTotal = ctx.playerBillsSnapshot.reduce((s, b) => s + b.amount, 0);
          const salary = ctx.card.skipSalary ? 0 : PAYDAY_AMOUNT;
          setPlayers(prevP => prevP.map((p, i) => i === currentIdx
            ? { ...p, cash: p.cash + salary - billsTotal, bills: [], monthsCompleted: p.monthsCompleted + 1 }
            : p));
          const parts = [];
          if (salary > 0) parts.push(`+$${salary.toLocaleString()} salary`);
          if (ctx.card.skipSalary) parts.push(`(salary skipped per card)`);
          if (billsTotal > 0) parts.push(`-$${billsTotal.toLocaleString()} bills`);
          addLog(`💵 Mid-month Payday for ${currentPlayer.name}: ${parts.join(', ')}`, 'good');
        }
        setAdvanceContext(null);
        // Fire the destination event (forceCharity routes through a special charity draw)
        if (ctx.card.forceCharity) {
          const charityCards = cards.mail.filter(m => m.kind === 'charity');
          const drawn = charityCards[Math.floor(Math.random() * charityCards.length)];
          if (drawn) {
            setEvent({ kind: 'mail', cards: [drawn] });
          } else {
            setEvent(null);
            nextTurn();
          }
        } else {
          triggerLanding(ctx.dest);
        }
        return true;
      };

      setTimeout(() => {
        setNarration({
          text: `Day ${space.day} — ${info.label}`,
          kind: 'landing',
          icon: info.icon,
        });
        // Defer actual event trigger so player can read the banner
        setTimeout(() => {
          if (!finishAdvance()) triggerLanding(space);
        }, 2000);
      }, landingDisplayDelay);
    }
    prevMovesRef.current = movesLeft;
  }, [movesLeft, currentPlayer]);

  const triggerLanding = (space) => {
    // Clear the landing narration once the actual modal/event is about to open
    setNarration(null);
    switch (space.type) {
      case 'mail': {
        // Draw 1, 2, or 3 cards (equal odds) from the shuffled deck
        const drawCount = Math.floor(Math.random() * 3) + 1;
        const drawn = [];
        for (let i = 0; i < drawCount; i++) {
          const c = drawCard('mail');
          if (c) drawn.push(c);
        }
        setEvent({ kind: 'mail', cards: drawn });
        break;
      }
      case 'deal': {
        if (cards.deal.length === 0) { addLog('No deal cards available', 'info'); return; }
        setEvent({ kind: 'deal', card: drawCard('deal') });
        break;
      }
      case 'venmo': {
        if (cards.venmo.length === 0) { addLog('No Zelle cards', 'info'); return; }
        setEvent({ kind: 'venmo', card: drawCard('venmo') });
        break;
      }
      case 'happybday': {
        // Happy Birthday: each other player Zelles you $200 (per official rule, modernized)
        setEvent({ kind: 'happybday', perPlayer: 200 });
        break;
      }
      case 'sidehustle': {
        // Tiered Side Hustle: present the upfront investment options.
        // Each tier requires a one-time payment and pays out at every subsequent Payday.
        setEvent({ kind: 'sidehustle' });
        break;
      }
      case 'yardsale': {
        // Yard Sale: shows a Deal card upfront. Player rolls; pays $100 × roll for it.
        if (cards.deal.length === 0) { addLog('No deal cards', 'info'); return; }
        setEvent({
          kind: 'yardsale',
          phase: 'intro',          // intro → rolled
          card: drawCard('deal'),
          roll: null,
          cost: 0,
        });
        break;
      }
      case 'surprise': {
        // Surprise Expense: draw a card, roll the die, cost = $500 × roll.
        // Player can pay now or defer to next Payday with 50% surcharge.
        if (!cards.surprise || cards.surprise.length === 0) {
          addLog('No surprise cards', 'info');
          return;
        }
        setEvent({
          kind: 'surprise',
          phase: 'intro',          // intro → rolled → decision
          card: drawCard('surprise'),
          roll: null,
          cost: 0,
        });
        break;
      }
      case 'crypto': {
        if (cards.crypto.length === 0) { addLog('No crypto cards', 'info'); return; }
        setEvent({ kind: 'crypto', card: drawCard('crypto') });
        break;
      }
      case 'datenight': {
        if (cards.datenight.length === 0) { addLog('No date night cards', 'info'); return; }
        setEvent({ kind: 'datenight', card: drawCard('datenight') });
        break;
      }
      case 'kidlife': {
        if (cards.kidlife.length === 0) { addLog('No kid life cards', 'info'); return; }
        setEvent({ kind: 'kidlife', card: drawCard('kidlife') });
        break;
      }
      case 'sweepstakes': {
        // Sweepstakes: roll the die, win $1,000 × the roll
        setEvent({ kind: 'sweepstakes', phase: 'intro', roll: null, prize: 0 });
        break;
      }
      case 'lottery': {
        // Lottery: each player decides to ante $100. Bank antes $1,000 if anyone plays.
        // Players pick unique numbers 1-6 starting with landing player. Roll until someone wins.
        // Decision order starts with landing player, then moves left (next player).
        const order = [];
        for (let off = 0; off < players.length; off++) {
          order.push(players[(currentIdx + off) % players.length].id);
        }
        setEvent({
          kind: 'lottery',
          phase: 'ante',             // ante → picking → rolling → won
          ante: 100,
          bankAnte: 1000,
          turnOrder: order,          // full order starting with landing player
          antePlayerIds: [],         // array of player ids who anted (in turn order)
          decisionsLeft: order,      // ids still needing to decide ante (in order)
          picks: {},                 // playerId -> number 1-6
          pickingIdx: 0,             // index into antePlayerIds for who's picking now
          roll: null,
          winnerId: null,
          pot: 0,
        });
        break;
      }
      case 'jackpot': {
        setEvent({ kind: 'jackpot', amount: pickRandom(JACKPOT_AMOUNTS) });
        break;
      }
      case 'radio': {
        // Radio Contest: each player rolls in sequence; high roll wins $1,000. Ties re-roll both.
        // Roll order: landing player first, then the other player(s).
        const rollOrder = [
          currentPlayer.id,
          ...players.filter(p => p.id !== currentPlayer.id).map(p => p.id),
        ];
        setEvent({
          kind: 'radio',
          phase: 'rolling',         // rolling → tie → result
          rollOrder,                 // playerIds in roll order
          rollIndex: 0,              // index of the player currently rolling
          rolls: {},                 // playerId -> die value
          winnerId: null,
          prize: 1000,
          tieRound: 0,               // increments on each tie re-roll
        });
        break;
      }
      case 'buyer': {
        setEvent({ kind: 'buyer' });
        break;
      }
      case 'payday': {
        // Tax Day fires every 4 months (one fiscal year) — comes BEFORE the Payday breakdown.
        // The player's next month after tax is the "new fiscal year" so we trigger when
        // monthsCompleted+1 is a multiple of TAX_MONTH_INTERVAL.
        const upcomingMonth = currentPlayer.monthsCompleted + 1;
        const isTaxDay = upcomingMonth % TAX_MONTH_INTERVAL === 0;
        if (isTaxDay) {
          const netWorth = currentPlayer.cash + currentPlayer.savings + currentPlayer.crypto - currentPlayer.loans;
          // Only owe tax on positive net worth — no refund credit for net debt
          const taxOwed = netWorth > 0 ? Math.floor(netWorth * TAX_RATE) : 0;
          setEvent({ kind: 'taxday', netWorth, taxOwed, fiscalYear: Math.floor(upcomingMonth / TAX_MONTH_INTERVAL) });
        } else {
          setEvent({ kind: 'payday' });
        }
        break;
      }
      default: break;
    }
  };

  // ============= TURN ADVANCEMENT =============
  // Pass the turn to the next active (not-yet-finished) player.
  // If all players have completed all months, show the extend-or-finish offer.
  const nextTurn = () => {
    setNarration(null);
    setTimeout(() => {
      setPlayers(prevPlayers => {
        // Are all players done?
        const allDone = prevPlayers.every(p => p.monthsCompleted >= totalMonths);
        if (allDone) {
          // Offer the table a chance to extend by another month before the game closes out
          setScreen('extendOffer');
          return prevPlayers;
        }
        // Find next player who isn't finished
        let nextIdx = (currentIdx + 1) % prevPlayers.length;
        let safety = 0;
        while (prevPlayers[nextIdx].monthsCompleted >= totalMonths && safety < prevPlayers.length) {
          nextIdx = (nextIdx + 1) % prevPlayers.length;
          safety++;
        }
        const nextPlayer = prevPlayers[nextIdx];
        // Build a recap from the snapshot taken at the start of the prev player's turn
        let recap = null;
        const snap = turnStartSnapshotRef.current;
        const prevPlayer = prevPlayers[currentIdx];
        if (snap && prevPlayer && snap.playerId === prevPlayer.id) {
          const cashDelta = prevPlayer.cash - snap.cash;
          const savingsDelta = prevPlayer.savings - snap.savings;
          const cryptoDelta = prevPlayer.crypto - snap.crypto;
          const loansDelta = prevPlayer.loans - snap.loans;
          const billsDelta = prevPlayer.bills.length - snap.bills;
          const dealsDelta = prevPlayer.deals.length - snap.deals;
          const changes = [];
          if (cashDelta !== 0) changes.push({ label: 'Cash', delta: cashDelta, money: true });
          if (savingsDelta !== 0) changes.push({ label: 'Savings', delta: savingsDelta, money: true });
          if (cryptoDelta !== 0) changes.push({ label: 'Crypto', delta: cryptoDelta, money: true });
          if (loansDelta !== 0) changes.push({ label: 'Loans', delta: loansDelta, money: true, inverted: true });
          if (billsDelta !== 0) changes.push({ label: 'Bills', delta: billsDelta, money: false, inverted: true });
          if (dealsDelta !== 0) changes.push({ label: 'Deals', delta: dealsDelta, money: false });
          if (changes.length > 0) recap = { player: prevPlayer, changes };
        }
        turnStartSnapshotRef.current = null;
        // Show the handoff overlay with the recap
        if (nextIdx !== currentIdx) {
          setTurnHandoff({ player: nextPlayer, recap });
          setTimeout(() => setTurnHandoff(null), 3200);
        }
        setCurrentIdx(nextIdx);
        setDiceValue(null);
        return prevPlayers;
      });
    }, 400);
  };

  // Extend the game by N more months. Each player needs to keep playing until
  // they reach the new totalMonths count. We rewind position to 0 only for
  // players who already finished, so they start the new month fresh.
  const extendGame = (additionalMonths) => {
    const newTotal = totalMonths + additionalMonths;
    setTotalMonths(newTotal);
    setPlayers(prev => prev.map(p => p.monthsCompleted >= totalMonths
      ? { ...p, position: 0 } // already-finished players resume from Day 1
      : p));
    setScreen('game');
    // Reset turn to player 0 (or to whoever was current — they were the last to roll)
    // Keep currentIdx as-is since they were already up
  };

  const finishGame = () => {
    clearSavedGame();
    setScreen('end');
  };

  // ============= EVENT RESOLVERS =============
  // Apply a single mail card's effect immediately (no animation queueing).
  // Used for cards that don't require recipient selection.
  const applyMailCard = (c, recipientId = null) => {
    if (c.kind === 'bill') {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        addLog(`📬 ${p.name}: ${c.name} ($${c.amount}) added to bills`, 'bad');
        return { ...p, bills: [...p.bills, { ...c, instance: newId() }] };
      }));
      return { sound: 'loss' };
    }
    if (c.kind === 'gift') {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        addLog(`🎁 ${p.name}: ${c.name} +$${c.amount}`, 'good');
        return { ...p, cash: p.cash + c.amount };
      }));
      return { sound: 'win' };
    }
    if (c.kind === 'monstercharge') {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        const newCharges = p.monsterCharges + c.amount;
        addLog(`💳 ${p.name}: Monster Charge $${c.amount.toLocaleString()} (total now $${newCharges.toLocaleString()})`, 'bad');
        return { ...p, monsterCharges: newCharges };
      }));
      return { sound: 'loss' };
    }
    if (c.kind === 'charity') {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        addLog(`🤝 ${p.name} donated $${c.amount.toLocaleString()} to ${c.name} (goes to Jackpot)`, 'info');
        return { ...p, cash: p.cash - c.amount };
      }));
      setJackpot(j => j + (c.amount || 0));
      addLog(`🎰 Jackpot pool grew by $${c.amount.toLocaleString()}`, 'info');
      return { sound: 'loss' };
    }
    if (c.kind === 'payneighbor' && recipientId !== null) {
      let payerName = '', recName = '';
      setPlayers(prev => prev.map(p => {
        if (p.id === currentPlayer.id) { payerName = p.name; return { ...p, cash: p.cash - c.amount }; }
        if (p.id === recipientId) { recName = p.name; return { ...p, cash: p.cash + c.amount }; }
        return p;
      }));
      addLog(`👋 ${payerName || currentPlayer.name} paid ${recName} $${c.amount.toLocaleString()} for "${c.name}"`, 'bad');
      return { sound: 'loss' };
    }
    if (c.kind === 'madmoney' && recipientId !== null) {
      let collectorName = '', payerName = '';
      setPlayers(prev => prev.map(p => {
        if (p.id === currentPlayer.id) { collectorName = p.name; return { ...p, cash: p.cash + c.amount }; }
        if (p.id === recipientId) { payerName = p.name; return { ...p, cash: p.cash - c.amount }; }
        return p;
      }));
      addLog(`💵 ${collectorName || currentPlayer.name} collected $${c.amount.toLocaleString()} from ${payerName} ("${c.name}")`, 'good');
      return { sound: 'win' };
    }
    if (c.kind === 'madmoney_bank') {
      // Player collects from the bank — no other-player involvement
      setPlayers(prev => prev.map((p, i) =>
        i === currentIdx ? { ...p, cash: p.cash + c.amount } : p
      ));
      addLog(`💵 ${currentPlayer.name} collected $${c.amount.toLocaleString()} from the bank (${c.name})`, 'good');
      return { sound: 'win' };
    }
    // junk mail (postcards, advertisements, etc.)
    addLog(`📬 ${currentPlayer.name}: junk mail (${c.name})`, 'info');
    return { sound: null };
  };

  const resolveMail = () => {
    // Build a step list: each card becomes either an immediate "apply" step,
    // a "pick recipient" step (for payneighbor/madmoney), an "advance" step
    // (advances player to a target space and runs that event), or a
    // "lottery_card" step (forces a high-stakes lottery on the spot).
    const opponents = players.filter(p => p.id !== currentPlayer.id);
    const steps = event.cards.map(c => {
      if (c.kind === 'advance')        return { kind: 'advance', card: c };
      if (c.kind === 'lottery_card')   return { kind: 'lottery_card', card: c };
      const needsRecipient = (c.kind === 'payneighbor' || c.kind === 'madmoney') && opponents.length > 0;
      if (needsRecipient && opponents.length === 1) {
        // 2-player: auto-assign the only opponent — no picker needed
        return { kind: 'apply', card: c, recipientId: opponents[0].id };
      }
      if (needsRecipient) {
        return { kind: 'pickRecipient', card: c };
      }
      return { kind: 'apply', card: c, recipientId: null };
    });
    setEvent({ kind: 'mailFlow', steps, stepIdx: 0, pendingTransfers: [] });
  };

  // Drive the mail-flow state machine.
  useEffect(() => {
    if (!event || event.kind !== 'mailFlow') return;
    const { steps, stepIdx, pendingTransfers } = event;
    // All steps done — play queued transfers, then advance turn
    if (stepIdx >= steps.length) {
      setEvent(null);
      if (pendingTransfers.length > 0) {
        const playNext = (idx) => {
          if (idx >= pendingTransfers.length) {
            setCashTransfer(null);
            nextTurn();
            return;
          }
          setCashTransfer(pendingTransfers[idx]);
          setTimeout(() => playNext(idx + 1), 3500);
        };
        playNext(0);
      } else {
        nextTurn();
      }
      return;
    }
    const step = steps[stepIdx];
    if (step.kind === 'apply') {
      // Apply immediately and advance to next step
      const result = applyMailCard(step.card, step.recipientId);
      // Queue a cash-transfer animation if applicable
      let newTransfers = pendingTransfers;
      if ((step.card.kind === 'payneighbor' || step.card.kind === 'madmoney') && step.recipientId !== null) {
        const other = players.find(p => p.id === step.recipientId);
        if (other) {
          const direction = step.card.kind === 'payneighbor' ? 'out' : 'in';
          const from = direction === 'out' ? currentPlayer : other;
          const to = direction === 'out' ? other : currentPlayer;
          newTransfers = [...pendingTransfers, {
            from, to,
            amount: step.card.amount,
            reason: step.card.name,
            direction,
          }];
        }
      }
      // Audio cue
      setTimeout(() => {
        if (result.sound === 'win') { SFX.cashIn(); HAPTIC.win(); }
        else if (result.sound === 'loss') { SFX.cashOut(); HAPTIC.loss(); }
      }, 50);
      setEvent(prev => prev && prev.kind === 'mailFlow'
        ? { ...prev, stepIdx: stepIdx + 1, pendingTransfers: newTransfers }
        : prev);
    }
    // pickRecipient is rendered as a modal; player choice will advance the state.
  }, [event && event.kind === 'mailFlow' ? event.stepIdx : null]);

  // Called when the player picks a recipient in the picker modal.
  const resolveMailRecipient = (recipientId) => {
    setEvent(prev => {
      if (!prev || prev.kind !== 'mailFlow') return prev;
      const step = prev.steps[prev.stepIdx];
      const newSteps = prev.steps.map((s, i) =>
        i === prev.stepIdx ? { kind: 'apply', card: s.card, recipientId } : s
      );
      // Advance: just rewrite the current step from pickRecipient to apply,
      // and re-trigger the effect by leaving stepIdx alone — but the effect
      // depends on stepIdx so we nudge it. Easiest: stay on same stepIdx but
      // mutate kind. We need to retrigger the apply, so bump and immediately
      // re-process via a tick.
      return { ...prev, steps: newSteps };
    });
    // Re-run the step now that it's an apply
    setTimeout(() => {
      setEvent(prev => {
        if (!prev || prev.kind !== 'mailFlow') return prev;
        const step = prev.steps[prev.stepIdx];
        if (!step || step.kind !== 'apply') return prev;
        const result = applyMailCard(step.card, step.recipientId);
        let newTransfers = prev.pendingTransfers;
        if ((step.card.kind === 'payneighbor' || step.card.kind === 'madmoney') && step.recipientId !== null) {
          const other = players.find(p => p.id === step.recipientId);
          if (other) {
            const direction = step.card.kind === 'payneighbor' ? 'out' : 'in';
            const from = direction === 'out' ? currentPlayer : other;
            const to = direction === 'out' ? other : currentPlayer;
            newTransfers = [...prev.pendingTransfers, {
              from, to, amount: step.card.amount, reason: step.card.name, direction,
            }];
          }
        }
        setTimeout(() => {
          if (result.sound === 'win') { SFX.cashIn(); HAPTIC.win(); }
          else if (result.sound === 'loss') { SFX.cashOut(); HAPTIC.loss(); }
        }, 50);
        return { ...prev, stepIdx: prev.stepIdx + 1, pendingTransfers: newTransfers };
      });
    }, 0);
  };

  // Player acknowledges an "advance" mail card — move them to the target space
  // and fire that destination event. If the path crosses Day 31 (Payday), the
  // pass-Payday flags on the card determine bill payment and salary collection.
  // Any remaining mail steps after an Advance are abandoned (it's a hard pivot).
  const findNextSpaceOfType = (fromPosition, targets) => {
    for (let i = 1; i <= BOARD_SPACES.length; i++) {
      const idx = (fromPosition + i - 1) % BOARD_SPACES.length;
      const space = BOARD_SPACES[idx];
      if (targets.includes(space.type)) return space;
    }
    return null;
  };

  const resolveMailAdvance = () => {
    const flowEvent = event;
    if (!flowEvent || flowEvent.kind !== 'mailFlow') return;
    const step = flowEvent.steps[flowEvent.stepIdx];
    const card = step.card;
    const player = players[currentIdx];
    const dest = findNextSpaceOfType(player.position, card.targets);
    if (!dest) {
      addLog(`📬 ${player.name}: ${card.name} (no target found)`, 'info');
      setEvent({ ...flowEvent, stepIdx: flowEvent.stepIdx + 1 });
      return;
    }
    addLog(`📬 ${player.name} advances to ${dest.label} (Day ${dest.day})`, 'info');
    // Calculate how many spaces to move (with wrap-around for crossing Payday)
    const startPos = player.position;
    const destIdx = BOARD_SPACES.findIndex(s => s.day === dest.day);
    let steps;
    if (destIdx > startPos) {
      steps = destIdx - startPos;
    } else {
      // Wrap around
      steps = (BOARD_SPACES.length - startPos) + destIdx;
    }
    const crossedPayday = destIdx <= startPos;
    // Stash the advance context so the movement effect knows what to fire on arrival
    setAdvanceContext({
      dest,
      destIdx,
      card,
      crossedPayday,
      playerBillsSnapshot: player.bills, // for mid-month payday calc
    });
    // Clear the event so the movement effect actually runs (it bails when an event is open)
    setEvent(null);
    // Show a narration banner with the day number target
    setNarration({
      text: `Advance to Day ${dest.day} — ${dest.label}`,
      kind: 'landing',
      icon: '🏃',
    });
    // Trigger animated movement
    setMovesLeft(steps);
  };

  // Player acknowledges a "lottery_card" — fires an on-the-spot lottery with
  // the card's custom ante and pot amounts. Any remaining mail steps are abandoned.
  const resolveMailLottery = () => {
    const flowEvent = event;
    if (!flowEvent || flowEvent.kind !== 'mailFlow') return;
    const step = flowEvent.steps[flowEvent.stepIdx];
    const card = step.card;
    addLog(`🎟️ Special lottery! Ante $${card.ante}, Pot $${card.pot.toLocaleString()}`, 'info');
    // Fire a lottery event with the card's stakes — uses the standard lottery
    // schema so the existing LotteryModal renders correctly.
    const order = [];
    for (let off = 0; off < players.length; off++) {
      order.push(players[(currentIdx + off) % players.length].id);
    }
    setEvent({
      kind: 'lottery',
      phase: 'ante',
      ante: card.ante,
      bankAnte: card.pot,
      turnOrder: order,
      antePlayerIds: [],
      decisionsLeft: order,
      picks: {},
      pickingIdx: 0,
      roll: null,
      winnerId: null,
      pot: 0,
    });
  };

  const resolveDeal = (buy) => {
    if (buy) {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        if (p.cash < event.card.cost) {
          addLog(`${p.name} can't afford ${event.card.name}`, 'bad');
          return p;
        }
        addLog(`💼 ${p.name} bought ${event.card.name} for $${event.card.cost}`, 'info');
        return {
          ...p,
          cash: p.cash - event.card.cost,
          deals: [...p.deals, { ...event.card, instance: newId() }],
        };
      }));
    } else {
      addLog(`${currentPlayer.name} passed on ${event.card.name}`, 'info');
    }
    setEvent(null);
    nextTurn();
  };

  const resolveVenmo = () => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      const c = event.card;
      const delta = c.direction === 'in' ? c.amount : -c.amount;
      addLog(`💸 Zelle: ${c.name} ${delta >= 0 ? '+' : ''}$${delta}`, delta >= 0 ? 'good' : 'bad');
      return { ...p, cash: p.cash + delta };
    }));
    setEvent(null);
    nextTurn();
  };

  // Happy Birthday: every other player Zelles the birthday player $perPlayer.
  // Each payer may have to take a loan to cover it.
  const resolveHappyBday = () => {
    setPlayers(prev => {
      const per = event.perPlayer;
      const otherCount = prev.length - 1;
      const totalReceived = per * otherCount;
      return prev.map((p, i) => {
        if (i === currentIdx) {
          addLog(`🎂 ${p.name}'s Birthday! Collected $${totalReceived.toLocaleString()} from ${otherCount} player${otherCount > 1 ? 's' : ''}`, 'good');
          return { ...p, cash: p.cash + totalReceived };
        }
        addLog(`🎂 ${p.name} Zelled ${prev[currentIdx].name} $${per.toLocaleString()} for birthday`, 'bad');
        return { ...p, cash: p.cash - per };
      });
    });
    SFX.cashIn(); HAPTIC.win(); launchConfetti('normal');
    setEvent(null);
    nextTurn();
  };

  // Side Hustle: player chooses to buy into a tier, cash out an existing hustle, or skip.
  // action: { kind: 'buy', tierId } | { kind: 'cashout', tierId } | { kind: 'skip' }
  const resolveSideHustle = (action) => {
    if (!action || action.kind === 'skip') {
      addLog(`${currentPlayer.name} passed on side hustles`, 'info');
      setEvent(null);
      nextTurn();
      return;
    }
    if (action.kind === 'buy') {
      const tier = SIDE_HUSTLE_TIERS.find(t => t.id === action.tierId);
      if (!tier) { setEvent(null); nextTurn(); return; }
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        if (p.cash < tier.cost) {
          addLog(`${p.name} can't afford ${tier.name}`, 'bad');
          return p;
        }
        addLog(`⚡ ${p.name} launched ${tier.name} (-$${tier.cost.toLocaleString()}, +$${tier.perPayday}/payday)`, 'good');
        updateStats(s => ({ ...s, hustlesLaunched: (s.hustlesLaunched || 0) + 1 }));
        return {
          ...p,
          cash: p.cash - tier.cost,
          sideHustles: [
            ...p.sideHustles,
            { tierId: tier.id, name: tier.name, emoji: tier.emoji, perPayday: tier.perPayday, cashOut: tier.cashOut, started: month },
          ],
        };
      }));
      setEvent(null);
      nextTurn();
      return;
    }
    if (action.kind === 'cashout') {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        const hustle = p.sideHustles.find(h => h.tierId === action.tierId);
        if (!hustle) return p;
        addLog(`💰 ${p.name} cashed out ${hustle.name} for $${hustle.cashOut.toLocaleString()}`, 'good');
        return {
          ...p,
          cash: p.cash + hustle.cashOut,
          sideHustles: p.sideHustles.filter(h => h.tierId !== action.tierId),
        };
      }));
      setTimeout(() => { SFX.cashIn(); HAPTIC.win(); }, 30);
      setEvent(null);
      nextTurn();
    }
  };

  // Yard Sale: roll the die, cost = $100 × roll. Player can take it (adds to deals tray) or pass.
  const handleYardSaleRoll = () => {
    SFX.drumroll();
    HAPTIC.heavy();
    const roll = rollDie();
    const cost = roll * 100;
    setEvent(prev => ({ ...prev, phase: 'rolled', roll, cost }));
  };

  const handleYardSaleDecide = (take) => {
    if (!take) {
      addLog(`${currentPlayer.name} passed on yard sale (${event.card.name})`, 'info');
      setEvent(null);
      nextTurn();
      return;
    }
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      addLog(`🏷️ ${p.name} bought ${event.card.name} at yard sale for $${event.cost} (worth $${event.card.sellMin}-$${event.card.sellMax})`, 'good');
      SFX.cashIn(); HAPTIC.win(); launchConfetti('normal');
      return {
        ...p,
        cash: p.cash - event.cost,
        // Override `cost` with what was actually paid at the yard sale,
        // so profit math at the Buyer space uses the real purchase price.
        deals: [...p.deals, { ...event.card, cost: event.cost, instance: newId() }],
      };
    }));
    setEvent(null);
    nextTurn();
  };

  // Surprise Expense: roll the die to determine cost, then choose pay-now or defer.
  const handleSurpriseRoll = () => {
    SFX.drumroll();
    HAPTIC.heavy();
    const roll = rollDie();
    const cost = roll * 500;
    setEvent(prev => ({ ...prev, phase: 'rolled', roll, cost }));
  };

  const handleSurpriseDecide = (defer) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      if (defer) {
        const surcharge = Math.floor(event.cost * 0.5);
        const total = event.cost + surcharge;
        addLog(`😬 ${p.name} deferred ${event.card.name} ($${event.cost.toLocaleString()} + 50% = $${total.toLocaleString()} on Payday)`, 'bad');
        SFX.cashOut(); HAPTIC.medium();
        return {
          ...p,
          bills: [...p.bills, {
            id: `deferred-${Date.now()}`,
            instance: newId(),
            kind: 'bill',
            name: `${event.card.name} (deferred + 50%)`,
            amount: total,
          }],
        };
      }
      addLog(`💸 ${p.name} paid ${event.card.name}: -$${event.cost.toLocaleString()}`, 'bad');
      SFX.cashOut(); HAPTIC.loss();
      return { ...p, cash: p.cash - event.cost };
    }));
    setEvent(null);
    nextTurn();
  };

  const resolveCrypto = (action) => {
    // action: 'buy', 'sell', 'hold'
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      const c = event.card;
      let cash = p.cash;
      let crypto = p.crypto;
      if (action === 'buy') {
        const buyAmt = Math.min(500, cash);
        cash -= buyAmt;
        crypto += buyAmt;
        addLog(`₿ ${p.name} bought $${buyAmt.toLocaleString()} crypto`, 'info');
      } else if (action === 'sell' && crypto > 0) {
        const newVal = Math.max(0, Math.floor(crypto * (1 + c.delta)));
        const profit = newVal - crypto;
        cash += newVal;
        addLog(`₿ ${p.name} sold crypto: $${newVal.toLocaleString()} (${profit >= 0 ? '+' : ''}$${profit.toLocaleString()})`, profit >= 0 ? 'good' : 'bad');
        crypto = 0;
      } else {
        if (crypto > 0) {
          const newVal = Math.max(0, Math.floor(crypto * (1 + c.delta)));
          const change = newVal - crypto;
          addLog(`₿ ${c.name} — holdings now $${newVal.toLocaleString()} (${change >= 0 ? '+' : ''}$${change.toLocaleString()})`, change >= 0 ? 'good' : 'bad');
          crypto = newVal;
        } else {
          addLog(`₿ ${c.name} (no holdings)`, 'info');
        }
      }
      return { ...p, cash, crypto };
    }));
    setEvent(null);
    nextTurn();
  };

  const resolveDateNight = (go) => {
    const card = event.card;
    const cardBond = typeof card.bond === 'number' ? card.bond : 5; // safe default
    const currentP = players[currentIdx];
    // Compute the bond change & engagement up-front so it doesn't depend on the
    // setPlayers updater closure (which React can defer/run-twice).
    let bondChange = 0;
    let didEngage = false;
    if (card.cost === 0) {
      bondChange = cardBond;
      didEngage = true;
      addLog(`💕 ${currentP.name}: ${card.name} (free) +${cardBond} bond`, 'info');
    } else if (!go) {
      bondChange = BOND_SKIP_PENALTY;
      addLog(`💕 ${currentP.name}: skipped "${card.name}" (${BOND_SKIP_PENALTY} bond)`, 'bad');
    } else if (currentP.cash < card.cost) {
      bondChange = BOND_SKIP_PENALTY;
      addLog(`${currentP.name} can't afford ${card.name} — counts as skip`, 'bad');
    } else {
      bondChange = cardBond;
      didEngage = true;
      addLog(`💕 ${currentP.name}: ${card.name} -$${card.cost.toLocaleString()} (+${cardBond} bond)`, 'info');
    }
    // Apply the cash deduction only when actually going on a paid date
    if (didEngage && card.cost > 0) {
      setPlayers(prev => prev.map((p, i) =>
        i === currentIdx ? { ...p, cash: p.cash - card.cost } : p
      ));
    }
    // Stats: track honored vs skipped dates (free dates count as honored)
    if (didEngage) {
      updateStats(s => ({ ...s, datesHonored: (s.datesHonored || 0) + 1 }));
    } else {
      updateStats(s => ({ ...s, datesSkipped: (s.datesSkipped || 0) + 1 }));
    }
    // Apply the bond change with clamp and animate
    if (bondChange !== 0) {
      setBond(prev => {
        const next = Math.max(BOND_MIN, Math.min(BOND_MAX, prev + bondChange));
        setBondDelta({ from: prev, to: next, change: bondChange });
        setTimeout(() => setBondDelta(null), 1800);
        return next;
      });
      if (didEngage) { SFX.cashIn(); HAPTIC.win(); }
    }
    setEvent(null);
    nextTurn();
  };

  const resolveKidLife = () => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      const c = event.card;
      if (c.amount === 0) {
        addLog(`👶 ${c.name}`, 'good');
        return p;
      }
      addLog(`👶 ${c.name} -$${c.amount}`, 'bad');
      return { ...p, cash: p.cash - c.amount };
    }));
    setEvent(null);
    nextTurn();
  };

  // ============= SWEEPSTAKES =============
  // Roll the die, win $1,000 × roll (so $1,000 to $6,000)
  const handleSweepstakesRoll = () => {
    SFX.drumroll();
    HAPTIC.heavy();
    const roll = rollDie();
    const prize = roll * 1000;
    setEvent(prev => ({ ...prev, phase: 'result', roll, prize }));
  };

  const handleSweepstakesFinish = () => {
    if (event && event.prize > 0) {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        addLog(`🎁 Sweepstakes: ${p.name} rolled ${event.roll} → +$${event.prize.toLocaleString()}`, 'good');
        return { ...p, cash: p.cash + event.prize };
      }));
      // Effects based on prize size
      if (event.prize >= 5000) { SFX.big(); HAPTIC.bigwin(); launchConfetti('huge'); }
      else if (event.prize >= 3000) { SFX.cashIn(); HAPTIC.win(); launchConfetti('normal'); }
      else { SFX.cashIn(); HAPTIC.win(); }
    }
    setEvent(null);
    nextTurn();
  };

  // ============= LOTTERY =============
  // Each player decides to ante in turn (starting with landing player).
  // If at least one antes, bank antes $1,000 too. Players pick unique numbers 1-6.
  // Landing player rolls. Re-roll until someone wins.

  const handleLotteryAnte = (playerId, willAnte) => {
    setEvent(prev => {
      if (!prev || prev.kind !== 'lottery') return prev;
      const newDecisionsLeft = prev.decisionsLeft.filter(id => id !== playerId);
      let newAntePlayerIds = [...prev.antePlayerIds];
      let newPot = prev.pot;

      if (willAnte) {
        newAntePlayerIds.push(playerId);
        newPot += prev.ante;
        // Charge the ante
        setPlayers(ps => ps.map(p => p.id === playerId
          ? { ...p, cash: p.cash - prev.ante }
          : p
        ));
        const playerName = players.find(p => p.id === playerId)?.name || '';
        addLog(`🎟️ ${playerName} anted $${prev.ante} for the lottery`, 'info');
      } else {
        const playerName = players.find(p => p.id === playerId)?.name || '';
        addLog(`🎟️ ${playerName} sat out the lottery`, 'info');
      }

      // If everyone decided
      if (newDecisionsLeft.length === 0) {
        if (newAntePlayerIds.length === 0) {
          // No one anted — skip lottery entirely
          addLog(`🎟️ Lottery skipped — no one anted`, 'info');
          setTimeout(() => {
            setEvent(null);
            nextTurn();
          }, 600);
          return { ...prev, decisionsLeft: [], phase: 'skipped' };
        }
        // Bank antes too
        newPot += prev.bankAnte;
        addLog(`🏦 Bank antes $${prev.bankAnte.toLocaleString()} — pot is $${newPot.toLocaleString()}`, 'good');
        return {
          ...prev,
          decisionsLeft: [],
          antePlayerIds: newAntePlayerIds,
          pot: newPot,
          phase: 'picking',
          pickingIdx: 0,
        };
      }

      return {
        ...prev,
        decisionsLeft: newDecisionsLeft,
        antePlayerIds: newAntePlayerIds,
        pot: newPot,
      };
    });
  };

  const handleLotteryPick = (number) => {
    setEvent(prev => {
      if (!prev || prev.kind !== 'lottery') return prev;
      const playerId = prev.antePlayerIds[prev.pickingIdx];
      const playerName = players.find(p => p.id === playerId)?.name || '';
      const newPicks = { ...prev.picks, [playerId]: number };
      addLog(`🎟️ ${playerName} picked ${number}`, 'info');

      const nextPickingIdx = prev.pickingIdx + 1;
      if (nextPickingIdx >= prev.antePlayerIds.length) {
        // Everyone picked, move to rolling
        return { ...prev, picks: newPicks, phase: 'rolling' };
      }
      return { ...prev, picks: newPicks, pickingIdx: nextPickingIdx };
    });
  };

  // Lottery roll: roll the die repeatedly until a picked number comes up.
  // Each die roll is independently fair (1/6 per face). To make the math FEEL
  // fair (not magic), we animate through the re-rolls one at a time so you see
  // the die actually bounce on misses before landing on a winner.
  const handleLotteryRoll = () => {
    SFX.drumroll();
    HAPTIC.heavy();
    setEvent(prev => {
      if (!prev || prev.kind !== 'lottery') return prev;
      const pickedNumbers = Object.values(prev.picks);
      // Precompute the full roll sequence (fair coin flips). Cap at 50.
      const rollHistory = [];
      let roll;
      let attempts = 0;
      do {
        roll = rollDie();
        rollHistory.push(roll);
        attempts++;
      } while (!pickedNumbers.includes(roll) && attempts < 50);
      const winnerEntry = Object.entries(prev.picks).find(([, n]) => n === roll);
      const winnerId = winnerEntry ? parseInt(winnerEntry[0]) : null;
      // Enter "spinning" phase: walk through the rollHistory one die-face at a time.
      return {
        ...prev,
        rollHistory,
        rollHistoryIdx: 0,
        roll: rollHistory[0],
        winnerId,
        phase: 'spinning',
      };
    });
  };

  // Drive the visible reroll sequence: advance one die-face at a time so the
  // player sees real misses bouncing before the final winning face.
  useEffect(() => {
    if (!event || event.kind !== 'lottery' || event.phase !== 'spinning') return;
    const idx = event.rollHistoryIdx;
    const total = event.rollHistory.length;
    if (idx >= total - 1) {
      // Final face — pause then transition to 'won'
      const t = setTimeout(() => {
        setEvent(prev => (prev && prev.kind === 'lottery' && prev.phase === 'spinning')
          ? { ...prev, phase: 'won' }
          : prev);
        SFX.diceLand();
        HAPTIC.heavy();
      }, 1200);
      return () => clearTimeout(t);
    }
    // Tick to next face. Slow down as we approach the end for drama.
    const remaining = total - idx;
    const delay = remaining > 5 ? 220 : remaining > 2 ? 380 : 600;
    const t = setTimeout(() => {
      setEvent(prev => {
        if (!prev || prev.kind !== 'lottery' || prev.phase !== 'spinning') return prev;
        const nextIdx = prev.rollHistoryIdx + 1;
        return { ...prev, rollHistoryIdx: nextIdx, roll: prev.rollHistory[nextIdx] };
      });
      SFX.diceShake();
    }, delay);
    return () => clearTimeout(t);
  }, [event]);

  const handleLotteryFinish = () => {
    if (event && event.winnerId !== null) {
      const winner = players.find(p => p.id === event.winnerId);
      if (winner) {
        setPlayers(prev => prev.map(p =>
          p.id === event.winnerId
            ? { ...p, cash: p.cash + event.pot }
            : p
        ));
        addLog(`🎉 ${winner.name} wins the lottery: $${event.pot.toLocaleString()}!`, 'good');
        SFX.big(); HAPTIC.bigwin(); launchConfetti('huge');
      }
    }
    setEvent(null);
    nextTurn();
  };

  const resolveJackpot = () => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      addLog(`🎰 JACKPOT! +$${event.amount}`, 'good');
      return { ...p, cash: p.cash + event.amount };
    }));
    setEvent(null);
    nextTurn();
  };

  // Radio Contest: both players roll a die; high roll wins $1,000. Ties re-roll.
  const resolveRadioRoll = () => {
    SFX.drumroll();
    HAPTIC.heavy();
    setEvent(prev => {
      if (!prev || prev.kind !== 'radio') return prev;
      const playerId = prev.rollOrder[prev.rollIndex];
      const newRoll = rollDie();
      const newRolls = { ...prev.rolls, [playerId]: newRoll };
      const nextIndex = prev.rollIndex + 1;
      // Have all players rolled?
      if (nextIndex >= prev.rollOrder.length) {
        // All players have rolled — go to 'reveal' phase to show the final roll
        // before determining winner/tie. This holds the big die visible.
        const values = Object.values(newRolls);
        const max = Math.max(...values);
        const topPlayers = Object.entries(newRolls).filter(([, v]) => v === max);
        return {
          ...prev,
          rolls: newRolls,
          rollIndex: nextIndex,
          lastRoll: { playerId, value: newRoll },
          phase: 'reveal',                 // hold the final roll on screen
          pendingWinnerId: topPlayers.length === 1 ? parseInt(topPlayers[0][0]) : null,
          pendingTie: topPlayers.length > 1,
        };
      }
      // Still more players to roll — show the just-rolled result, then advance
      return {
        ...prev,
        rolls: newRolls,
        rollIndex: nextIndex,
        lastRoll: { playerId, value: newRoll },
        phase: 'showing',
      };
    });
  };

  // After a 'showing' or 'reveal' beat, advance the phase forward automatically.
  useEffect(() => {
    if (!event || event.kind !== 'radio') return;
    if (event.phase === 'showing') {
      // Hold the just-rolled result for ~2.4s, then return to rolling for next player
      const t = setTimeout(() => {
        setEvent(prev => (prev && prev.kind === 'radio' && prev.phase === 'showing')
          ? { ...prev, phase: 'rolling' }
          : prev);
      }, 2400);
      return () => clearTimeout(t);
    }
    if (event.phase === 'reveal') {
      // Hold the final roll, then move to result or tie
      const t = setTimeout(() => {
        setEvent(prev => {
          if (!prev || prev.kind !== 'radio' || prev.phase !== 'reveal') return prev;
          if (prev.pendingTie) {
            return {
              ...prev,
              rolls: {},
              rollIndex: 0,
              phase: 'tie',
              tieRound: prev.tieRound + 1,
              pendingTieRolls: prev.rolls,
            };
          }
          return { ...prev, phase: 'result', winnerId: prev.pendingWinnerId };
        });
      }, 2600);
      return () => clearTimeout(t);
    }
  }, [event]);

  // Player taps "ROLL AGAIN" after a tie — return to rolling phase
  const acknowledgeTie = () => {
    setEvent(prev => prev && prev.kind === 'radio'
      ? { ...prev, phase: 'rolling', pendingTieRolls: undefined }
      : prev);
  };

  const resolveRadioFinish = () => {
    const winner = players.find(p => p.id === event.winnerId);
    if (winner) {
      setPlayers(prev => prev.map(p =>
        p.id === event.winnerId ? { ...p, cash: p.cash + event.prize } : p
      ));
      addLog(`📻 Radio Contest: ${winner.name} wins $${event.prize.toLocaleString()}!`, 'good');
      SFX.cashIn(); HAPTIC.win(); launchConfetti('normal');
    }
    setEvent(null);
    nextTurn();
  };

  const resolveBuyer = (dealIdx) => {
    if (dealIdx === -1) {
      addLog(`${currentPlayer.name} kept all deals`, 'info');
      setEvent(null);
      nextTurn();
      return;
    }
    // Compute the sale BEFORE mutating, so we can show the result.
    const player = players[currentIdx];
    const deal = player?.deals[dealIdx];
    if (!deal) {
      setEvent(null);
      nextTurn();
      return;
    }
    const sellPrice = Math.floor(Math.random() * (deal.sellMax - deal.sellMin + 1)) + deal.sellMin;
    const profit = sellPrice - deal.cost;
    // Apply the sale to player state
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      return {
        ...p,
        cash: p.cash + sellPrice,
        deals: p.deals.filter((_, j) => j !== dealIdx),
      };
    }));
    addLog(`💰 ${player.name} sold ${deal.name} for $${sellPrice.toLocaleString()} (profit $${profit.toLocaleString()})`, 'good');
    updateStats(s => ({
      ...s,
      biggestDeal: Math.max(s.biggestDeal || 0, profit),
      totalEarnings: (s.totalEarnings || 0) + Math.max(0, profit),
    }));
    // Effects
    setTimeout(() => {
      if (profit >= 1000) { SFX.big(); HAPTIC.bigwin(); launchConfetti('normal'); }
      else if (profit > 0) { SFX.cashIn(); HAPTIC.win(); }
    }, 50);
    // Show the sale result step — user clicks CONTINUE to dismiss
    setEvent({ kind: 'buyerResult', sale: { dealName: deal.name, cost: deal.cost, sellPrice, profit } });
  };

  const resolveBuyerResult = () => {
    setEvent(null);
    nextTurn();
  };

  // Tax Day: deduct the tax amount from cash, then chain straight into the Payday event.
  // If the player can't afford the full bill, take all available cash and add the
  // shortfall to their loans (the IRS doesn't take "no" for an answer).
  const resolveTaxDay = () => {
    const amount = event.taxOwed;
    if (amount > 0) {
      setPlayers(prev => prev.map((p, i) => {
        if (i !== currentIdx) return p;
        if (p.cash >= amount) {
          return { ...p, cash: p.cash - amount };
        }
        const shortfall = amount - p.cash;
        // Round shortfall up to the nearest $1,000 (loans are in $1k increments)
        const debtAdded = Math.ceil(shortfall / 1000) * 1000;
        addLog(`🧾 ${p.name} couldn't pay tax in full — $${debtAdded.toLocaleString()} added to loans`, 'bad');
        return { ...p, cash: 0, loans: p.loans + debtAdded };
      }));
      addLog(`🧾 ${currentPlayer.name} owed $${amount.toLocaleString()} in property tax (3% of $${event.netWorth.toLocaleString()} net worth)`, 'bad');
      updateStats(s => ({ ...s, taxesPaid: (s.taxesPaid || 0) + amount }));
      SFX.cashOut(); HAPTIC.loss();
    } else {
      addLog(`🧾 ${currentPlayer.name}: no tax owed (net worth $${event.netWorth.toLocaleString()})`, 'info');
    }
    // Chain into Payday
    setEvent({ kind: 'payday' });
  };

  const resolvePayday = () => {
    let netForEffects = 0;
    let didFinish = false;
    const bondBonus = computeBondBonus(bond);
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      let cash = p.cash + PAYDAY_AMOUNT;
      const billsTotal = p.bills.reduce((s, b) => s + b.amount, 0);
      const loanInterest = Math.floor(p.loans * LOAN_INTEREST_RATE);
      const savingsInterest = Math.floor(p.savings * SAVINGS_INTEREST_RATE);
      // Side hustle payouts: each active hustle pays its perPayday at every Payday
      const hustlePayout = (p.sideHustles || []).reduce((s, h) => s + (h.perPayday || 0), 0);
      cash += hustlePayout;
      cash -= billsTotal;
      cash -= loanInterest;
      // Apply bond bonus/penalty (-$1000 to +$1000)
      cash += bondBonus;
      // Monster Charge: 10% interest charges only on the balance CARRIED from the
      // previous Payday (true credit-card grace period). New charges drawn this
      // month are interest-free if paid off here. Whatever doesn't get paid off
      // becomes the new carried balance for next month.
      let mcInterest = 0;
      let mcPaidPrincipal = 0;
      let newMonsterCarried = 0;
      let newMonsterCharges = p.monsterCharges;
      if (p.monsterCharges > 0) {
        // Interest applies to the carried portion only
        mcInterest = Math.floor((p.monsterCarried || 0) * 0.10);
        cash -= mcInterest;
        // Try to pay off the full live balance with whatever cash is left
        if (cash >= p.monsterCharges) {
          mcPaidPrincipal = p.monsterCharges;
          cash -= p.monsterCharges;
          newMonsterCharges = 0;
          newMonsterCarried = 0;
        } else if (cash > 0) {
          // Partial payment: pay what we can, the rest becomes next month's carried
          mcPaidPrincipal = cash;
          newMonsterCharges = p.monsterCharges - cash;
          cash = 0;
          newMonsterCarried = newMonsterCharges;
        } else {
          // Couldn't pay anything: whole balance carries
          newMonsterCarried = p.monsterCharges;
        }
      }
      netForEffects = PAYDAY_AMOUNT + hustlePayout - billsTotal - loanInterest - mcInterest - mcPaidPrincipal + bondBonus;
      const newSavings = p.savings + savingsInterest;
      const newMonthsCompleted = p.monthsCompleted + 1;
      const parts = [`+$${PAYDAY_AMOUNT.toLocaleString()} salary`];
      if (hustlePayout > 0) parts.push(`+$${hustlePayout.toLocaleString()} side hustles`);
      if (billsTotal > 0) parts.push(`-$${billsTotal.toLocaleString()} bills`);
      if (loanInterest > 0) parts.push(`-$${loanInterest.toLocaleString()} loan int`);
      if (mcInterest > 0) parts.push(`-$${mcInterest.toLocaleString()} Monster Charge int (on $${(p.monsterCarried || 0).toLocaleString()} carried)`);
      if (mcPaidPrincipal > 0) parts.push(`-$${mcPaidPrincipal.toLocaleString()} Monster Charge ${newMonsterCharges === 0 ? 'paid off' : 'paid down'}`);
      else if (newMonsterCharges > 0) parts.push(`($${newMonsterCharges.toLocaleString()} Monster Charge carried over)`);
      if (savingsInterest > 0) parts.push(`+$${savingsInterest.toLocaleString()} savings int`);
      if (bondBonus !== 0) parts.push(`${bondBonus > 0 ? '+' : ''}$${bondBonus.toLocaleString()} bond ${bondBonus > 0 ? 'bonus' : 'penalty'}`);
      addLog(`💵 PAY DAY ${p.name} (month ${newMonthsCompleted}/${totalMonths}): ${parts.join(', ')}`, 'good');
      const nextPosition = newMonthsCompleted >= totalMonths ? p.position : 0;
      if (newMonthsCompleted >= totalMonths) {
        addLog(`🏁 ${p.name} finished all ${totalMonths} months`, 'good');
        didFinish = true;
      }
      return {
        ...p,
        cash,
        savings: newSavings,
        bills: [],
        monsterCharges: newMonsterCharges,
        monsterCarried: newMonsterCarried,
        monthsCompleted: newMonthsCompleted,
        position: nextPosition,
      };
    }));
    // Effects
    setTimeout(() => {
      if (didFinish) { SFX.big(); HAPTIC.bigwin(); launchConfetti('huge'); }
      else if (netForEffects > 0) { SFX.cashIn(); HAPTIC.win(); }
      else { SFX.cashOut(); HAPTIC.loss(); }
    }, 50);
    // Stats: track the biggest Payday net (whether positive or negative)
    updateStats(s => ({
      ...s,
      biggestPayday: Math.max(s.biggestPayday || 0, netForEffects),
      totalEarnings: (s.totalEarnings || 0) + Math.max(0, netForEffects),
    }));
    setEvent(null);
    // Update the displayed "month" indicator to be the lowest in-progress month
    setTimeout(() => {
      setPlayers(prev => {
        const lowestMonth = Math.min(...prev.map(p => Math.min(p.monthsCompleted + 1, totalMonths)));
        setMonth(lowestMonth);
        return prev;
      });
    }, 100);
    nextTurn();
  };

  // ============= LOAN & SAVINGS =============
  // Per official rules: a player may have savings OR a loan, not both.
  const takeLoan = (amount) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      if (p.savings > 0) {
        addLog(`🏦 ${p.name} can't take a loan with savings open. Withdraw first.`, 'bad');
        return p;
      }
      addLog(`🏦 ${p.name} took loan +$${amount.toLocaleString()}`, 'info');
      return { ...p, cash: p.cash + amount, loans: p.loans + amount };
    }));
    setShowLoanModal(false);
  };

  const repayLoan = (amount) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      // Per rules: loan repayments only on Payday, in $1,000 increments. Allow anytime here for app convenience.
      const repay = Math.min(amount, p.loans, p.cash);
      addLog(`🏦 ${p.name} repaid $${repay.toLocaleString()}`, 'info');
      return { ...p, cash: p.cash - repay, loans: p.loans - repay };
    }));
  };

  const deposit = (amount) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      if (p.loans > 0) {
        addLog(`🏦 ${p.name} can't open savings while in debt. Pay loan first.`, 'bad');
        return p;
      }
      const dep = Math.min(amount, p.cash);
      if (dep <= 0) return p;
      addLog(`🏦 ${p.name} deposited $${dep.toLocaleString()} to savings`, 'info');
      return { ...p, cash: p.cash - dep, savings: p.savings + dep };
    }));
  };

  const withdraw = (amount) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentIdx) return p;
      const wd = Math.min(amount, p.savings);
      if (wd <= 0) return p;
      addLog(`🏦 ${p.name} withdrew $${wd.toLocaleString()} from savings`, 'info');
      return { ...p, cash: p.cash + wd, savings: p.savings - wd };
    }));
  };

  const reset = () => {
    setScreen('menu');
    setPlayers([]);
    setMonth(1);
    setCurrentIdx(0);
    setDiceValue(null);
    setMovesLeft(0);
    setEvent(null);
    setLog([]);
  };

  // ============= CARD EDITOR =============
  const updateCards = async (newCards) => {
    setCards(newCards);
    await saveCards(newCards);
  };

  const restoreDefaults = async () => {
    setCards(DEFAULT_CARDS);
    await saveCards(DEFAULT_CARDS);
  };

  // ============= RENDER =============
  return (
    <div className="min-h-screen w-full paper-bg" style={{
      fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
      background: THEME.bg,
      color: THEME.text,
    }}>
      {screen === 'menu' && <Menu
        onStart={() => setScreen('setup')}
        onEditor={() => setScreen('editor')}
        onHowToPlay={() => setScreen('howto')}
        cardsLoaded={cardsLoaded}
        hasSavedGame={hasSavedGame}
        onResume={resumeGame}
        onShowStats={() => setScreen('stats')}
        stats={stats}
      />}
      {screen === 'stats' && <StatsScreen stats={stats} onBack={() => setScreen('menu')} />}
      {screen === 'howto' && <HowToPlay onBack={() => setScreen('menu')} />}
      {screen === 'setup' && <Setup onBegin={startGame} onBack={() => setScreen('menu')} />}
      {screen === 'editor' && <CardEditor cards={cards} onSave={updateCards} onRestore={restoreDefaults} onBack={() => setScreen('menu')} />}
      {screen === 'game' && currentPlayer && (
        <Game
          players={players}
          currentPlayer={currentPlayer}
          currentIdx={currentIdx}
          month={month}
          totalMonths={totalMonths}
          diceValue={diceValue}
          isRolling={isRolling}
          movesLeft={movesLeft}
          onRoll={handleRoll}
          event={event}
          onResolveMail={resolveMail}
          onResolveMailRecipient={resolveMailRecipient}
          onResolveMailAdvance={resolveMailAdvance}
          onResolveMailLottery={resolveMailLottery}
          onResolveDeal={resolveDeal}
          onResolveVenmo={resolveVenmo}
          onResolveHappyBday={resolveHappyBday}
          onResolveSideHustle={resolveSideHustle}
          onYardSaleRoll={handleYardSaleRoll}
          onYardSaleDecide={handleYardSaleDecide}
          onSurpriseRoll={handleSurpriseRoll}
          onSurpriseDecide={handleSurpriseDecide}
          onResolveCrypto={resolveCrypto}
          onResolveDateNight={resolveDateNight}
          onResolveKidLife={resolveKidLife}
          onSweepstakesRoll={handleSweepstakesRoll}
          onSweepstakesFinish={handleSweepstakesFinish}
          onLotteryAnte={handleLotteryAnte}
          onLotteryPick={handleLotteryPick}
          onLotteryRoll={handleLotteryRoll}
          onLotteryFinish={handleLotteryFinish}
          onResolveJackpot={resolveJackpot}
          onResolveRadioRoll={resolveRadioRoll}
          onResolveRadioFinish={resolveRadioFinish}
          onRadioAcknowledgeTie={acknowledgeTie}
          onResolveBuyer={resolveBuyer}
          onResolveBuyerResult={resolveBuyerResult}
          onResolvePayday={resolvePayday}
          onResolveTaxDay={resolveTaxDay}
          narration={narration}
          turnHandoff={turnHandoff}
          jackpot={jackpot}
          jackpotWin={jackpotWin}
          cashTransfer={cashTransfer}
          bond={bond}
          bondDelta={bondDelta}
          log={log}
          showLoanModal={showLoanModal}
          setShowLoanModal={setShowLoanModal}
          showRepayModal={showRepayModal}
          setShowRepayModal={setShowRepayModal}
          onTakeLoan={takeLoan}
          onRepayLoan={repayLoan}
          onDeposit={deposit}
          onWithdraw={withdraw}
          onReset={reset}
        />
      )}
      {screen === 'extendOffer' && <ExtendOffer players={players} totalMonths={totalMonths} onExtend={extendGame} onFinish={finishGame} />}
      {screen === 'end' && <EndScreen players={players} onRestart={reset} />}
    </div>
  );
}

  const defaultColors = [THEME.p1, THEME.p2, THEME.p3, THEME.p4];

    THEME.p1, THEME.p2, THEME.p3, THEME.p4,
    THEME.purple, THEME.pink, THEME.success, '#f97316', // orange
  ];
  const defaultNames = ['Mike', 'Shayla', 'Player 3', 'Player 4'];

  const [playerCount, setPlayerCount] = useState(2);
  const [playerData, setPlayerData] = useState(() => (
    [0, 1, 2, 3].map(i => ({
      name: defaultNames[i],
      avatar: AVATAR_CATALOG[i].id,
      color: defaultColors[i],
    }))
  ));
  const [months, setMonths] = useState(3);
  // Which player slot's avatar picker is open (null = closed)
  const [pickerOpen, setPickerOpen] = useState(null);

  const updatePlayer = (idx, key, value) => {
    setPlayerData(prev => prev.map((p, i) => i === idx ? { ...p, [key]: value } : p));
  };

  const activePlayers = playerData.slice(0, playerCount);

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
      <div className="max-w-md w-full">
        <button onClick={onBack} className="mb-6 text-sm text-slate-400 hover:text-slate-200">← Back</button>

            Number of players

          <div className="grid grid-cols-3 gap-2 mb-6">
            {[2, 3, 4].map(n => (
              <button
                key={n}
                onClick={() => setPlayerCount(n)}

                style={{
                  background: playerCount === n
                    ? 'linear-gradient(135deg, #fbbf24, #f472b6)'
                    : 'rgba(255,255,255,0.05)',
                  color: playerCount === n ? 'white' : '#94a3b8',
                  border: `1px solid ${playerCount === n ? 'transparent' : 'rgba(255,255,255,0.1)'}`,
                  transform: playerCount === n ? 'scale(1.03)' : 'scale(1)',
                }}
              >{n}</button>
            ))}
          </div>

          {/* Per-player rows */}
          <div className="space-y-4 mb-6">
            {activePlayers.map((p, i) => {
              const av = findAvatar(p.avatar);
              const isPickerOpen = pickerOpen === i;

                activePlayers.map((x, j) => j !== i ? x.avatar : null).filter(Boolean)

function Board({ players, currentIdx }) {

  const cells = [];
  for (let i = 0; i < DAY_1_COLUMN; i++) cells.push({ empty: true, key: `pre-${i}` });
  BOARD_SPACES.forEach((space, idx) => cells.push({ space, idx, key: `s-${idx}` }));

  return (
    <div className="p-3 rounded-2xl bg-white/5 border border-white/10">
      {/* Day-of-week headers */}
      <div className="grid grid-cols-7 gap-1.5 mb-1.5">

            style={{ color: i === 0 || i === 6 ? '#fbbf24' : '#64748b' }}

        {cells.map((cell) => {

            <BoardSpace

  );
